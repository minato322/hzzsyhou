spring.application.name=zhishui

# 数据库连接配置
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/zhishui?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 服务器配置
server.port=8080
server.servlet.context-path=/api

# CORS 配置
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# JWT 配置
jwt.secret=your-secret-key
jwt.expiration=86400

# DeepSeek API 配置
deepseek.api.key=sk-e83e2eb2a4e34e1b8419d6c1a5f672a8
deepseek.api.url=https://api.deepseek.com/v1/chat/completions
